name: 盤中即時報價更新 V11

on:
  schedule:
    # 台灣交易時段 09:05~13:25（UTC 01:05~05:25）
    - cron: "5 1 * * 1-5"    # 09:05
    - cron: "35 1 * * 1-5"   # 09:35
    - cron: "5 2 * * 1-5"    # 10:05
    - cron: "35 2 * * 1-5"   # 10:35
    - cron: "5 3 * * 1-5"    # 11:05
    - cron: "35 3 * * 1-5"   # 11:35
    - cron: "5 4 * * 1-5"    # 12:05
    - cron: "35 4 * * 1-5"   # 12:35
    - cron: "5 5 * * 1-5"    # 13:05
    - cron: "25 5 * * 1-5"   # 13:25（盤中最後一次）
    - cron: "5 6 * * 1-5"    # 14:05（盤後收盤確認，取當日最終收盤價）
  workflow_dispatch:

permissions:
  contents: write

# ✅ 盤中若有新排程觸發，取消舊的（避免堆積）
concurrency:
  group: live-update
  cancel-in-progress: true

jobs:
  fetch-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run live fetch
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/fetch_live.py

      # ✅ V9核心修正：只 push live.json
      # 同時把 remote 最新的 stocks.json 先 fetch 進來，避免覆蓋掉 fetch-data 的成果
      - name: Commit and push live.json only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 先 fetch remote 最新狀態
          git fetch origin main

          # 確保本地 stocks.json 是最新的（以 remote 為準，不覆蓋）
          git checkout origin/main -- data/stocks.json 2>/dev/null || true

          # 只 stage live.json
          git add data/live.json
          if git diff --staged --quiet; then
            echo "No changes to live.json"
            exit 0
          fi

          git commit -m "live: 即時報價 $(TZ='Asia/Taipei' date +'%Y/%m/%d %H:%M')"

          # push，失敗重試
          for i in 1 2 3; do
            git push origin HEAD:main && echo "Push OK" && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 2))
            git fetch origin main
            git checkout origin/main -- data/stocks.json 2>/dev/null || true
            git add data/live.json
            git diff --staged --quiet || git commit --amend --no-edit
          done
          exit 1
