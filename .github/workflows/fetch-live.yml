name: 盤中即時報價更新

on:
  schedule:
    # 台灣交易時段 09:05~13:25（UTC 01:05~05:25）
    - cron: "5 1 * * 1-5"
    - cron: "35 1 * * 1-5"
    - cron: "5 2 * * 1-5"
    - cron: "35 2 * * 1-5"
    - cron: "5 3 * * 1-5"
    - cron: "35 3 * * 1-5"
    - cron: "5 4 * * 1-5"
    - cron: "35 4 * * 1-5"
    - cron: "5 5 * * 1-5"
    - cron: "25 5 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run live fetch
        run: python scripts/fetch_live.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "live: 即時報價 $(TZ='Asia/Taipei' date +'%Y/%m/%d %H:%M')"
            git pull --rebase origin main
            git push origin main
          fi
