name: 盤中參考卡更新 V18

# V18：放棄盤中高頻排程（每30分鐘×10次），改成每天只跑1次，
# 排在 fetch-data 主排程（18:00/18:30）之後執行，
# 確保讀到的是「今天」剛更新好的 stocks.json，而不是昨天的舊資料。
# 原因：免費資料源做不到真正的盤中即時，這支腳本現在只是把
# stocks.json 整理成「盤中參考卡」（內容是昨收，非即時）。
on:
  schedule:
    - cron: "45 10 * * 1-5"  # 台灣 18:45（緊接在 fetch-data 主排程 18:00/18:30 之後）
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-update
  cancel-in-progress: true

jobs:
  fetch-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run live fetch (reference cards only)
        run: python scripts/fetch_live.py

      - name: Commit and push live.json only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout origin/main -- data/stocks.json 2>/dev/null || true

          git add data/live.json
          if git diff --staged --quiet; then
            echo "No changes to live.json"
            exit 0
          fi

          git commit -m "live: 盤中參考卡 $(TZ='Asia/Taipei' date +'%Y/%m/%d %H:%M')"

          for i in 1 2 3; do
            git push origin HEAD:main && echo "Push OK" && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 2))
            git fetch origin main
            git checkout origin/main -- data/stocks.json 2>/dev/null || true
            git add data/live.json
            git diff --staged --quiet || git commit --amend --no-edit
          done
          exit 1
