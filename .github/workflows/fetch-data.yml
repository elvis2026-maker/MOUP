name: 每日盤後抓資料

on:
  schedule:
    # 台灣時間 14:00 = UTC 06:00（盤後資料通常 13:35 後已上傳到 TWSE）
    - cron: "0 6 * * 1-5"    # 台灣 14:00（主要）
    - cron: "30 6 * * 1-5"   # 台灣 14:30（備份）
    - cron: "0 8 * * 1-5"    # 台灣 16:00（保底，確認資料完整）
  workflow_dispatch:

# V5修正：加上 pages:write，確保 data 推送後 Pages 能正確 rebuild
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        run: python scripts/fetch_twse.py

      # V5新增：重置 live.json，清除昨日殘留報價
      - name: Reset live.json
        run: python scripts/init_live.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json data/live.json
          git diff --staged --quiet || git commit -m "chore: 更新選股資料 $(TZ='Asia/Taipei' date +'%Y/%m/%d %H:%M')"
          git push
