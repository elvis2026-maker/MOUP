name: 每日盤後抓資料 V24

# V24 排程設計：
#
# FinMind TOKEN 配額：600 req/hr（每整點重置）
# V24 每次執行約用 300~450 req → 一個小時只能跑 1 次
#
# 問題：V23 排了 18:00~23:00 共 6 次，第 2 次開始就 402（配額不夠）
#
# V24 解法：改成「分散到不同小時」，每次跑完隔一小時才跑下一次
#   台灣 18:00 → 主要執行（FinMind 17:30 更新後）
#   台灣 20:00 → 第一備援（如果 18:00 的資料有問題）
#   台灣 22:00 → 第二備援（確保當天一定有資料）
#
# 三次執行間隔各 2 小時，API 配額充裕（每次 300~450 req，每小時 600 req）
# 若當天資料已更新，commit 步驟會偵測到「No changes」直接跳過，不會重複推送
#
#   台灣時間 → UTC：
#     台灣 18:00 = UTC 10:00
#     台灣 20:00 = UTC 12:00
#     台灣 22:00 = UTC 14:00

on:
  schedule:
    - cron: "0 10 * * 1-5"   # 台灣 18:00（主要）
    - cron: "0 12 * * 1-5"   # 台灣 20:00（第一備援，隔 2 小時讓配額重置）
    - cron: "0 14 * * 1-5"   # 台灣 22:00（第二備援）
  workflow_dispatch:

permissions:
  contents: write

# 同一時間只允許一個執行，避免並發衝突
concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/fetch_twse.py

      - name: Commit and push stocks.json only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json
          if git diff --staged --quiet; then
            echo "No changes to stocks.json"
            exit 0
          fi
          git commit -m "chore: 更新選股資料 $(TZ='Asia/Taipei' date +'%Y/%m/%d %H:%M')"
          for i in 1 2 3; do
            git pull --ff-only origin main && git push origin main && echo "Push OK" && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 3))
            git fetch origin main
            git checkout origin/main -- data/live.json 2>/dev/null || true
            git add data/stocks.json
          done
          echo "All push attempts failed"
          exit 1
