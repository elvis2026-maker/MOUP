name: 每日盤後抓資料

on:
  schedule:
    # TWSE openapi 盤後資料約 15:30~16:00 更新完畢
    # UTC 08:00 = 台灣 16:00（主要）
    - cron: "0 8 * * 1-5"
    # UTC 08:30 = 台灣 16:30（備援，確保資料已更新）
    - cron: "30 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        env:
          # 選填：至 finmindtrade.com 免費申請 token（僅權證 fallback 用到）
          # 到 repo Settings > Secrets and variables > Actions 新增 FINMIND_TOKEN
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/fetch_twse.py

      - name: Reset live.json
        run: python scripts/init_live.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json data/live.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: 更新選股資料 $(TZ='Asia/Taipei' date +'%Y/%m/%d %H:%M')"
            git pull --rebase origin main
            git push origin main
          fi
