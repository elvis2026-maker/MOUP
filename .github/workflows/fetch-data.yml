name: 每日盤後抓資料

on:
  schedule:
    - cron: "0 6 * * 1-5"    # 台灣 14:00（主要）
    - cron: "30 6 * * 1-5"   # 台灣 14:30（備份）
    - cron: "0 8 * * 1-5"    # 台灣 16:00（保底）
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        env:
          # 可選：至 finmindtrade.com 免費註冊後，在 GitHub Settings > Secrets 加入
          # FINMIND_TOKEN 可將 API 上限從 300/hr 提升到 600/hr
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/fetch_twse.py

      - name: Reset live.json
        run: python scripts/init_live.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json data/live.json
          git diff --staged --quiet || git commit -m "chore: 更新選股資料 $(TZ='Asia/Taipei' date +'%Y/%m/%d %H:%M')"
          git push
