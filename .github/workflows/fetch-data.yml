name: 每日盤後抓資料 V23

# V23 排程說明：
#   FinMind 股價日K 在台灣時間 17:30 更新。
#   每小時跑一次（18:00~23:00），確保資料拿到。
#   V23 每次約用 250~400 req，在 600/hr 上限內安全執行。
#   週一至週五才跑，週末不跑。
#
#   台灣時間 → UTC（GitHub cron 用 UTC）：
#     台灣 18:00 = UTC 10:00
#     台灣 19:00 = UTC 11:00
#     台灣 20:00 = UTC 12:00
#     台灣 21:00 = UTC 13:00
#     台灣 22:00 = UTC 14:00
#     台灣 23:00 = UTC 15:00

on:
  schedule:
    - cron: "0 10 * * 1-5"   # 台灣 18:00（主要，FinMind 17:30 更新後）
    - cron: "0 11 * * 1-5"   # 台灣 19:00
    - cron: "0 12 * * 1-5"   # 台灣 20:00
    - cron: "0 13 * * 1-5"   # 台灣 21:00
    - cron: "0 14 * * 1-5"   # 台灣 22:00
    - cron: "0 15 * * 1-5"   # 台灣 23:00
  workflow_dispatch:

permissions:
  contents: write

# 同一時間只允許一個執行，避免並發衝突
concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/fetch_twse.py

      - name: Commit and push stocks.json only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json
          if git diff --staged --quiet; then
            echo "No changes to stocks.json"
            exit 0
          fi
          git commit -m "chore: 更新選股資料 $(TZ='Asia/Taipei' date +'%Y/%m/%d %H:%M')"
          for i in 1 2 3; do
            git pull --ff-only origin main && git push origin main && echo "Push OK" && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 3))
            git fetch origin main
            git checkout origin/main -- data/live.json 2>/dev/null || true
            git add data/stocks.json
          done
          echo "All push attempts failed"
          exit 1
