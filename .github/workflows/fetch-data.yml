name: 每日盤後抓資料 V27

# V27 排程設計：
#
# 4 個 TOKEN 各 600 req/hr，輪詢切換 → 合計可用 2400 req/hr
# 每次執行約用 300~450 req，理論上一個小時可以跑多次
#
# 但 GitHub Actions cron 精度約 ±5 分鐘，不適合太密集排程
# 採保守策略：每小時跑一次（18:00~22:00），共 5 次
# 即使某次因 GitHub 延遲跳過，下一次一定能跑到
#
#   台灣時間 → UTC：
#     台灣 18:00 = UTC 10:00（主要，FinMind 17:30 更新後）
#     台灣 19:00 = UTC 11:00
#     台灣 20:00 = UTC 12:00
#     台灣 21:00 = UTC 13:00
#     台灣 22:00 = UTC 14:00

on:
  schedule:
    - cron: "0 10 * * 1-5"   # 台灣 18:00（主要）
    - cron: "0 11 * * 1-5"   # 台灣 19:00
    - cron: "0 12 * * 1-5"   # 台灣 20:00
    - cron: "0 13 * * 1-5"   # 台灣 21:00
    - cron: "0 14 * * 1-5"   # 台灣 22:00
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        env:
          FINMIND_TOKEN_1: ${{ secrets.FINMIND_TOKEN_1 }}
          FINMIND_TOKEN_2: ${{ secrets.FINMIND_TOKEN_2 }}
          FINMIND_TOKEN_3: ${{ secrets.FINMIND_TOKEN_3 }}
          FINMIND_TOKEN_4: ${{ secrets.FINMIND_TOKEN_4 }}
        run: python scripts/fetch_twse.py

      - name: Commit and push stocks.json only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json
          if git diff --staged --quiet; then
            echo "No changes to stocks.json"
            exit 0
          fi
          git commit -m "chore: 更新選股資料 $(TZ='Asia/Taipei' date +'%Y/%m/%d %H:%M')"
          for i in 1 2 3; do
            git pull --ff-only origin main && git push origin main && echo "Push OK" && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 3))
            git fetch origin main
            git checkout origin/main -- data/live.json 2>/dev/null || true
            git add data/stocks.json
          done
          echo "All push attempts failed"
          exit 1
