name: 每日盤後抓資料 V13

on:
  schedule:
    - cron: "0 10 * * 1-5"   # 台灣 18:00（FinMind 17:30 更新後，多等 30 分鐘確保入庫）← 主要
    - cron: "30 10 * * 1-5"  # 台灣 18:30（備份）
    - cron: "0 8 * * 1-5"    # 台灣 16:00（盤中跑一次，用昨日資料先佔位）
  workflow_dispatch:

permissions:
  contents: write

# ✅ 同一時間只允許一個 fetch-data 執行，避免並發衝突
concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    # V13：全量掃描最多 600 支，預計耗時 3~5 分鐘，設定 timeout 保護
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/fetch_twse.py

      - name: Commit and push stocks.json only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json
          if git diff --staged --quiet; then
            echo "No changes to stocks.json"
            exit 0
          fi
          git commit -m "chore: 更新選股資料 $(TZ='Asia/Taipei' date +'%Y/%m/%d %H:%M')"
          for i in 1 2 3; do
            git pull --ff-only origin main && git push origin main && echo "Push OK" && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 3))
            git fetch origin main
            git checkout origin/main -- data/live.json 2>/dev/null || true
            git add data/stocks.json
          done
          echo "All push attempts failed"
          exit 1
